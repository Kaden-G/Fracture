<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FRACTURE — Simulation Harness</title>
<style>
  body { font-family: 'Courier New', monospace; background: #0d1117; color: #e6edf3; padding: 20px; }
  h1 { color: #f1c40f; margin-bottom: 8px; }
  .controls { margin: 16px 0; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  label { font-size: 13px; color: #8b949e; }
  input { font-family: inherit; font-size: 14px; padding: 6px 10px; background: #161b22; color: #e6edf3; border: 1px solid #30363d; width: 80px; }
  button { font-family: inherit; font-size: 14px; padding: 8px 20px; background: #f1c40f; color: #0d1117; border: none; cursor: pointer; font-weight: bold; }
  button:hover { background: #f39c12; }
  button:disabled { opacity: 0.4; cursor: wait; }
  #output { white-space: pre-wrap; font-size: 13px; line-height: 1.5; background: #161b22; padding: 16px; border: 1px solid #30363d; margin-top: 16px; max-height: 70vh; overflow-y: auto; }
  .stat-row { display: flex; gap: 8px; }
  .stat-label { min-width: 140px; color: #8b949e; }
  .stat-bar { background: #30363d; height: 18px; position: relative; flex: 1; max-width: 300px; }
  .stat-fill { height: 100%; position: absolute; left: 0; top: 0; }
  .stat-pct { font-size: 12px; position: absolute; right: 4px; top: 1px; color: #e6edf3; }
</style>
</head>
<body>
<h1>⚡ FRACTURE SIMULATION HARNESS</h1>
<p style="color:#8b949e;">AI-vs-AI headless games using the pure engine + AI modules.</p>
<div class="controls">
  <div><label>Games:</label><br><input id="numGames" type="number" value="100" min="1" max="10000"></div>
  <div><label>Base seed:</label><br><input id="baseSeed" type="number" value="1" min="0"></div>
  <div style="align-self:flex-end;"><label style="cursor:pointer;"><input id="tyrantOn" type="checkbox"> <span style="color:#e74c3c;font-weight:bold;">🦠 TYRANT ON</span></label></div>
  <div style="align-self:flex-end;"><button id="runBtn" onclick="runSim()">▶ RUN SIMULATION</button></div>
  <div style="align-self:flex-end;"><button onclick="if(window._lastSimOutput){navigator.clipboard.writeText(window._lastSimOutput);this.textContent='✓ Copied!';setTimeout(()=>this.textContent='📋 COPY OUTPUT',1500)}">📋 COPY OUTPUT</button></div>
</div>
<div id="output">Ready. Click RUN to start.</div>

<script type="module">
import { runBatch } from './simulate.js';

window.runSim = async function() {
  const numGames = parseInt(document.getElementById('numGames').value) || 100;
  const baseSeed = parseInt(document.getElementById('baseSeed').value) || 1;
  const out = document.getElementById('output');
  const btn = document.getElementById('runBtn');

  btn.disabled = true;
  out.textContent = `Running ${numGames} games (seed: ${baseSeed})...\n`;

  // Yield to the UI before crunching
  await new Promise(r => setTimeout(r, 50));

  const t0 = performance.now();
  let stats;
  try {
    const tyrant = document.getElementById('tyrantOn').checked;
    stats = runBatch(numGames, baseSeed, { tyrant });
  } catch (e) {
    out.textContent += `\n❌ ERROR: ${e.message}\n${e.stack}`;
    btn.disabled = false;
    return;
  }
  const elapsed = ((performance.now() - t0) / 1000).toFixed(2);

  let text = `Completed ${numGames} games in ${elapsed}s\n\n`;

  text += '═══ WIN RATES BY FACTION ═══\n';
  const factionColors = { grid: '#f39c12', syndicate: '#e74c3c', commune: '#2ecc71', ghost: '#9b59b6' };
  for (const [fk, n] of Object.entries(stats.winCounts).sort((a,b) => b[1] - a[1])) {
    const pct = (n / numGames * 100).toFixed(1);
    const bar = '█'.repeat(Math.round(pct / 2)) + '░'.repeat(50 - Math.round(pct / 2));
    text += `  ${fk.padEnd(12)} ${n.toString().padStart(4)}  ${bar} ${pct}%\n`;
  }

  text += '\n═══ WIN CONDITIONS ═══\n';
  for (const [c, n] of Object.entries(stats.condCounts).sort((a,b) => b[1] - a[1])) {
    const pct = (n / numGames * 100).toFixed(1);
    text += `  ${c.padEnd(20)} ${n.toString().padStart(4)}  (${pct}%)\n`;
  }

  text += '\n═══ WINNING TRAITS ═══\n';
  for (const [t, n] of Object.entries(stats.traitWins).sort((a,b) => b[1] - a[1])) {
    const pct = (n / numGames * 100).toFixed(1);
    text += `  ${t.padEnd(14)} ${n.toString().padStart(4)}  (${pct}%)\n`;
  }

  text += `\nAvg rounds: ${stats.avgRound}  |  Median: ${stats.medianRound}  |  Early (<R8): ${stats.earlyEndings}`;
  if (stats.errors) text += `  |  Errors: ${stats.errors}`;
  text += '\n';

  // Per-faction win-condition breakdown
  text += '\n═══ WIN CONDITIONS BY FACTION ═══\n';
  const allConds = [...new Set(stats.results.map(r => r.condition))].sort();
  const fks = Object.keys(stats.winCounts).sort((a,b) => (stats.winCounts[b]||0) - (stats.winCounts[a]||0));
  text += '  ' + 'faction'.padEnd(14);
  allConds.forEach(c => text += c.padStart(14));
  text += '       total\n';
  for (const fk of fks) {
    text += '  ' + fk.padEnd(14);
    const bd = stats.factionCondBreakdown[fk] || {};
    allConds.forEach(c => text += (bd[c] || 0).toString().padStart(14));
    text += (stats.winCounts[fk] || 0).toString().padStart(12) + '\n';
  }

  // Tyrant-specific stats
  if (document.getElementById('tyrantOn').checked) {
    text += '\n═══ TYRANT STATS ═══\n';

    // Win rate + condition split
    const tyrantWins = stats.results.filter(r => r.winnerFk === 'tyrant').length;
    text += `  Tyrant wins: ${tyrantWins}  (${(tyrantWins/numGames*100).toFixed(1)}%)\n`;
    if (tyrantWins) {
      const tyrantConds = {};
      stats.results.filter(r => r.winnerFk === 'tyrant').forEach(r => {
        tyrantConds[r.condition] = (tyrantConds[r.condition] || 0) + 1;
      });
      for (const [c, n] of Object.entries(tyrantConds).sort((a,b) => b[1] - a[1])) {
        text += `    ${c.padEnd(28)} ${n}\n`;
      }
    }

    // Tyrant elimination + survival
    const tyrantElim = stats.results.filter(r => r.factions['tyrant']?.eliminated).length;
    const tyrantSurv = numGames - tyrantElim;
    const tyrantElimActions = stats.results.reduce((s, r) => s + r.tyrantEliminations, 0);
    text += `  Tyrant survived: ${tyrantSurv} (${(tyrantSurv/numGames*100).toFixed(1)}%)  |  Eliminated: ${tyrantElim} (${(tyrantElim/numGames*100).toFixed(1)}%)\n`;
    if (tyrantElimActions) text += `  Tyrant elimination events (inc. harbored): ${tyrantElimActions}\n`;

    // Pacts signed per game
    const avgPacts = stats.results.reduce((s, r) => s + r.tyrantPacts, 0) / numGames;
    const avgAllPacts = stats.results.reduce((s, r) => s + r.pactCount, 0) / numGames;
    text += `  Avg pacts at end: ${avgAllPacts.toFixed(1)} total  |  ${avgPacts.toFixed(1)} Tyrant pacts\n`;

    // Conquest flips + renounce-kills
    const conquestFlips = stats.results.filter(r => r.tyrantConquest).length;
    text += `  Conquest flips: ${conquestFlips} (${(conquestFlips/numGames*100).toFixed(1)}%)\n`;
    const renounceKills = stats.results.reduce((s, r) => s + (r.renounceKills || 0), 0);
    if (renounceKills) text += `  Renounce-kills: ${renounceKills}\n`;

    // Corruption scoped to bound conspirators (had boon at end = was/is allied)
    let boundCorr = 0, boundMax = 0, boundCount = 0;
    stats.results.forEach(r => {
      for (const [fk, f] of Object.entries(r.factions)) {
        if (fk === 'tyrant') continue;
        if (f.corruption > 0 || f.boon) {
          boundCorr += f.corruption; boundCount++;
          if (f.corruption > boundMax) boundMax = f.corruption;
        }
      }
    });
    if (boundCount) {
      text += `  Bound conspirators: ${boundCount} across ${numGames} games\n`;
      text += `  Avg corruption (bound only): ${(boundCorr/boundCount).toFixed(1)}  |  Max: ${boundMax}\n`;
    } else {
      text += `  Bound conspirators: 0 (no pacts ever formed!)\n`;
    }

    // Boon distribution
    let boonTithe = 0, boonSic = 0, boonNone = 0;
    stats.results.forEach(r => {
      for (const [fk, f] of Object.entries(r.factions)) {
        if (fk === 'tyrant') continue;
        if (f.boon === 'tithe') boonTithe++;
        else if (f.boon === 'sic') boonSic++;
        else boonNone++;
      }
    });
    text += `  Boons at end: Tithe ${boonTithe}  |  Sic ${boonSic}  |  None ${boonNone}\n`;

    // Reckoning outcomes by corruption tier
    const allReckonings = stats.results.flatMap(r => r.reckonings || []);
    if (allReckonings.length > 0) {
      text += '\n═══ RECKONING OUTCOMES ═══\n';
      text += `  Total Reckonings: ${allReckonings.length}\n`;
      const tiers = ['low', 'mid', 'deep', 'moon', 'thralldom'];
      const tierLabels = {low:'corr 1-2', mid:'corr 3-5', deep:'corr 6-10', moon:'MOON BAND', thralldom:'AUTO-LOSS'};
      for (const tier of tiers) {
        const t = allReckonings.filter(r => r.tier === tier);
        if (t.length === 0) continue;
        const tyrantW = t.filter(r => r.tyrantWins).length;
        const conW = t.length - tyrantW;
        text += `  ${tier.padEnd(9)} (${tierLabels[tier]}): ${t.length} duels — Tyrant ${tyrantW} (${(tyrantW/t.length*100).toFixed(0)}%) vs Conspirator ${conW} (${(conW/t.length*100).toFixed(0)}%)\n`;
      }
      const tyrantTotalW = allReckonings.filter(r => r.tyrantWins).length;
      text += `  Overall: Tyrant ${tyrantTotalW}/${allReckonings.length} (${(tyrantTotalW/allReckonings.length*100).toFixed(1)}%)\n`;
    } else {
      text += `\n  ⚠️ No Reckonings fired in ${numGames} games!\n`;
    }
  }

  // Sample a few game details
  text += '\n═══ SAMPLE GAMES ═══\n';
  const samples = stats.results.slice(0, Math.min(5, stats.results.length));
  for (const g of samples) {
    text += `  Seed ${g.seed}: ${g.winnerFk || '?'} wins by ${g.condition} (R${g.round})`;
    if (g.winnerFk && g.factions[g.winnerFk]) text += ` [trait: ${g.factions[g.winnerFk].trait}]`;
    text += '\n';
  }

  out.textContent = text;
  btn.disabled = false;

  // Store for clipboard
  window._lastSimOutput = text;
};
</script>
</body>
</html>
